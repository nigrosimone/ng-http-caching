name: Node.js CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# a new push to a pull request supersedes the runs still in flight for it
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      # keep checking the other runtimes when one of them fails
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x, 26.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test:ci
      - name: Build library
        run: npm run build ng-http-caching
      - name: Build demo app
        run: npm run build ng-http-caching-demo
      - name: Upload coverage
        if: matrix.node-version == '24.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn
          retention-days: 7
